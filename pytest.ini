[pytest]
addopts = -v --strict-markers --html=reports/report.html --self-contained-html --capture=tee-sys
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: quick smoke tests
    regression: full regression tests
    login: login module
    admin: admin module
    pim: PIM module
    leave: leave module
    recruitment: recruitment module
    time: time module
    myinfo: my info module
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
